[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kindle-calibre"
version = "0.1.0"
description = "Kindle書籍をCalibreに一括インポート・管理するCLIツール"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "click>=8.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
kindle-calibre = "kindle_calibre.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (requires Calibre CLI)",
    "slow: Slow tests (bulk operations)",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.hatch.build.targets.wheel]
packages = ["src/kindle_calibre"]

[tool.hatch.build.targets.sdist]
include = ["src/kindle_calibre"]
